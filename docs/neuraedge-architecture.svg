<!-- 4 clusters, equal width=96, gap=8, total=4*96+3*8=408, start=(700-408)/2=146 => adjusted to fit -->
<!-- cluster width=96, spacing=12, 4 clusters total=4*96+3*12=420, offset=(500-420)/2=40, so x0=100+40=140 -->

<rect x="140" y="424" width="96" height="72" fill="#fff" stroke="#111" stroke-width="1"/>
