<!-- ── 5a. STDP ENGINE  y=536, h=106  x=100..380 ─── -->
<rect x="100" y="536" width="240" height="106" fill="#fff" stroke="#111" stroke-width="1.5"/>
<!-- Internal rule -->
<line x1="100" y1="558" x2="340" y2="558" stroke="#ccc" stroke-width="0.75"/>
<text x="220" y="552" font-family="'Times New Roman',serif" font-size="11" font-weight="bold"
      text-anchor="middle" fill="#111">STDP LEARNING ENGINE</text>
<text x="220" y="572" font-family="'Times New Roman',serif" font-size="9" fill="#444"
      text-anchor="middle">Trace-based  ·  online  ·  bidirectional</text>
<text x="220" y="587" font-family="'Times New Roman',serif" font-size="9" fill="#444"
      text-anchor="middle">LTP:  ΔW += A⁺ · pre_trace</text>
<text x="220" y="601" font-family="'Times New Roman',serif" font-size="9" fill="#444"
      text-anchor="middle">LTD:  ΔW −= A⁻ · post_trace</text>
<text x="220" y="616" font-family="'Times New Roman',serif" font-size="8.5" fill="#666"
      text-anchor="middle">A⁺=4,  A⁻=2,  W ∈ [0, 255]</text>
<text x="220" y="630" font-family="'Times New Roman',serif" font-size="8.5" fill="#666"
      text-anchor="middle">ltp_count,  ltd_count  (observability)</text>

<!-- ── 5b. SYNAPSE MEMORY  y=536, h=106  x=360..600 ─── -->
<rect x="360" y="536" width="240" height="106" fill="#fff" stroke="#111" stroke-width="1.5"/>
<line x1="360" y1="558" x2="600" y2="558" stroke="#ccc" stroke-width="0.75"/>
<text x="480" y="552" font-family="'Times New Roman',serif" font-size="11" font-weight="bold"
      text-anchor="middle" fill="#111">SYNAPSE MEMORY</text>
<text x="480" y="572" font-family="'Times New Roman',serif" font-size="9" fill="#444"
      text-anchor="middle">4-bank BRAM  ·  parallel access</text>
<text x="480" y="587" font-family="'Times New Roman',serif" font-size="9" fill="#444"
      text-anchor="middle">512 synapses/neuron  ·  8-bit weights</text>
<text x="480" y="601" font-family="'Times New Roman',serif" font-size="9" fill="#444"
      text-anchor="middle">32 KB/cluster  ·  128 KB total</text>
<text x="480" y="616" font-family="'Times New Roman',serif" font-size="8.5" fill="#666"
      text-anchor="middle">32 × RAMB18  ·  Artix-7</text>
<text x="480" y="630" font-family="'Times New Roman',serif" font-size="8.5" fill="#666"
      text-anchor="middle">no reset on rd-reg (BRAM inference)</text>

