<text x="188" y="457" font-family="'Times New Roman',serif" font-size="8.5"
      text-anchor="middle" fill="#444">64 LIF neurons</text>
<text x="188" y="470" font-family="'Times New Roman',serif" font-size="8"
      text-anchor="middle" fill="#666">8-bit  V[t]</text>
<text x="188" y="483" font-family="'Times New Roman',serif" font-size="8"
