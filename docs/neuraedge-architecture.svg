<line x1="350" y1="86" x2="350" y2="106" stroke="#111" stroke-width="1" marker-end="url(#a)"/>
<text x="358" y="100" font-family="'Times New Roman',serif" font-size="8.5" fill="#555">event stream</text>

<!-- ── 2. EVENT ENCODER  y=108, h=46 ─────── -->
